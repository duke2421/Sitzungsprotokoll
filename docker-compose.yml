services:
  schriftfuehrer:
    build: .
    container_name: schriftfuehrer
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-8080}:3000"
    environment:
      PORT: "3000"
      SESSION_SECRET: "please-change-this-secret"
      ADMIN_USERNAME: "admin"
      ADMIN_PASSWORD: "admin123"
      ADMIN_DISPLAY_NAME: "Administrator"
      TRUST_PROXY_HOPS: "1"
      COOKIE_SECURE: "auto"
      FORCE_HTTPS: "false"
      LOGIN_RATE_LIMIT_WINDOW_MS: "600000"
      LOGIN_RATE_LIMIT_MAX_ATTEMPTS: "5"
      TZ: "Europe/Berlin"
    volumes:
      - schriftfuehrer_data:/app/data

volumes:
  schriftfuehrer_data:
